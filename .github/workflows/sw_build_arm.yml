name: SWLauncher ARM Debug

on:
  workflow_dispatch:

jobs:
  build-arm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: on-failure

      - name: Build SWLauncher ARM Debug
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleDebug -Darch=arm

      - name: Upload SWLauncher ARM APK
        uses: actions/upload-artifact@v7
        with:
          name: swlauncher arm debug
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
          retention-days: 7
